services:
  # 1. DATABASE
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: noteapp
      MYSQL_ROOT_PASSWORD: 11111111
    networks:
      - app-network
    healthcheck: # Quan trọng để các service khác biết khi nào DB thực sự sẵn sàng
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p11111111"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. BACKEND (Web API)
  backend:
    build: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_KEY=base64:eLolFAXxf4WG12Lem7BPteOyLBKbcwkoK7pY338OAiU=
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      # Kết nối DB
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=noteapp
      - DB_USERNAME=root
      - DB_PASSWORD=11111111
      # Broadcast & Reverb (Backend nói chuyện với Reverb qua mạng nội bộ Docker)
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=123456
      - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - REVERB_APP_SECRET=somethingsecret
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      # Redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Mail
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=dengu2127@gmail.com
      - MAIL_PASSWORD=bnaboukmsevqavxw
      - MAIL_FROM_ADDRESS="lavarel@gmail.com"
      - MAIL_FROM_NAME="Laravel"
      # Khác
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    # CHỖ BẠN CẦN ĐÂY: Chạy migrate -> seed -> rồi mới bật php-fpm
    command: >
      sh -c "echo 'Waiting for MySQL...' && 
             sleep 10 && 
             php artisan migrate --force && 
             php artisan db:seed --force && 
             php-fpm"
    networks:
      - app-network

  # 3. QUEUE WORKER
  queue:
    build: ./backend
    container_name: laravel_worker
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=noteapp
      - DB_USERNAME=root
      - DB_PASSWORD=11111111
      - CACHE_STORE=database # Hoặc redis nếu bạn muốn dùng redis cho cache
      - QUEUE_CONNECTION=database # Hoặc redis
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started # Đợi backend chạy xong migrate/seed
    command: >
      sh -c "echo 'Waiting for MySQL...' && 
             sleep 10 && 
             php artisan queue:work --sleep=3 --tries=3"
    networks:
      - app-network

  # 4. REVERB
  reverb:
    build: ./backend
    container_name: laravel_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - REVERB_APP_ID=123456
      - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - REVERB_APP_SECRET=somethingsecret
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
      - REDIS_HOST=redis  # Đã sửa từ redis_server thành redis
    depends_on:
      - backend
      - redis
    networks:
      - app-network

  # 5. NGINX, REDIS, FRONTEND giữ nguyên như cũ
  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports: ["8000:8000"]
    volumes:
      - ./backend:/var/www
      - ./docker-config/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis_server
    networks:
      - app-network


  frontend:
    build: ./frontend
    container_name: react_app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - VITE_REVERB_HOST=localhost
      - VITE_REVERB_PORT=8080
      - VITE_REVERB_SCHEME=http

    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

