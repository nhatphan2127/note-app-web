# version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
      - /var/www/vendor # Giữ lại vendor trong container
    environment:
      # - REVERB_HOST=reverb
      # - REVERB_PORT=8080
      # - REVERB_SCHEME=http
      # - REVERB_APP_ID=123456
      # - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      # - REVERB_APP_SECRET=somethingsecret

      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_KEY=base64:eLolFAXxf4WG12Lem7BPteOyLBKbcwkoK7pY338OAiU=
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - APP_LOCALE=en
      - APP_FALLBACK_LOCALE=en
      - APP_FAKER_LOCALE=en_US
      - APP_MAINTENANCE_DRIVER=file
      - BCRYPT_ROUNDS=12
      - LOG_CHANNEL=stack
      - LOG_STACK=single
      - LOG_DEPRECATIONS_CHANNEL=null
      - LOG_LEVEL=debug
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=noteapp
      - DB_USERNAME=root
      - DB_PASSWORD=11111111
      - SESSION_DRIVER=database
      - SESSION_LIFETIME=120
      - SESSION_ENCRYPT=false
      - SESSION_PATH=/
      - SESSION_DOMAIN=null
      - BROADCAST_CONNECTION=reverb
      - FILESYSTEM_DISK=local
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - MEMCACHED_HOST=127.0.0.1
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - MAIL_MAILER=smtp
      - MAIL_SCHEME=null
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=dengu2127@gmail.com
      - MAIL_PASSWORD=bnaboukmsevqavxw
      - MAIL_FROM_ADDRESS="lavarel@gmail.com"
      - MAIL_FROM_NAME="${APP_NAME}"
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=
      - AWS_USE_PATH_STYLE_ENDPOINT=false
      - VITE_APP_NAME="${APP_NAME}"
      - FRONTEND_URL=http://localhost:5173
      - REVERB_APP_ID=123456
      - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - REVERB_APP_SECRET=6wioz8fx9aiiukh9ycj7
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - ./docker-config/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis_server
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: noteapp
      MYSQL_ROOT_PASSWORD: 11111111
    networks:
      - app-network

  queue:
    build: ./backend
    container_name: laravel_worker
    command: php artisan queue:work
    volumes:
      - ./backend:/var/www
    depends_on:
      - backend
      - db
      - redis
    networks:
      - app-network

  reverb:
    build: ./backend
    container_name: laravel_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8080:8080"
    environment:
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=noteapp
      - DB_USERNAME=root
      - DB_PASSWORD=11111111
      - CACHE_STORE=redis
      - REDIS_HOST=redis_server
      - REVERB_APP_ID=123456
      - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - REVERB_APP_SECRET=somethingsecret
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    depends_on:
      - backend
      - redis
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

# ĐẢM BẢO ĐOẠN NÀY KHÔNG BỊ THỤT LỀ
networks:
  app-network:
    driver: bridge