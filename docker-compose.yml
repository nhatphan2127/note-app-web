# version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
      - /var/www/vendor # Giữ lại vendor trong container
    environment:
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REVERB_APP_ID=123456
      - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - REVERB_APP_SECRET=somethingsecret
    
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - ./docker-config/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis_server
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: noteapp
      MYSQL_ROOT_PASSWORD: 11111111
    networks:
      - app-network

  queue:
    build: ./backend
    container_name: laravel_worker
    command: php artisan queue:work
    volumes:
      - ./backend:/var/www
    depends_on:
      - backend
      - db
      - redis
    networks:
      - app-network

  reverb:
    build: ./backend
    container_name: laravel_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8080:8080"
    environment:
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=noteapp
      - DB_USERNAME=root
      - DB_PASSWORD=11111111
      - CACHE_STORE=redis
      - REDIS_HOST=redis_server
      - REVERB_APP_ID=123456
      - REVERB_APP_KEY=6wioz8fx9aiiukh9ycj7
      - REVERB_APP_SECRET=somethingsecret
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    depends_on:
      - backend
      - redis
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

# ĐẢM BẢO ĐOẠN NÀY KHÔNG BỊ THỤT LỀ
networks:
  app-network:
    driver: bridge